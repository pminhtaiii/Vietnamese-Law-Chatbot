# ============================================================
# CI/CD Smoke Test — Legal RAG Evaluation
# ============================================================
# Runs a fast generation-only evaluation (no backend needed)
# on every push/PR to main. Ensures the generator's system
# prompt and formatting rules haven't regressed.
# ============================================================

name: RAG Evaluation Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'evaluation/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'evaluation/**'

env:
  # Minimum acceptable overall score (out of 5.0).
  # If the generator drops below this, the PR is blocked.
  MIN_OVERALL_SCORE: "4.0"

jobs:
  eval-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -q google-generativeai cohere pandas tqdm httpx

      - name: Run evaluation (generation-only, 10 samples)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: |
          python evaluation/legal_rag_evaluator.py \
            --n_samples 10 \
            --no_backend \
            --output_dir eval_smoke_results \
            --seed 42

      - name: Check score threshold
        run: |
          python -c "
          import csv, sys

          csv_path = 'eval_smoke_results/scores_summary.csv'
          try:
              with open(csv_path, 'r', encoding='utf-8-sig') as f:
                  reader = csv.DictReader(f)
                  scores = [float(row['overall']) for row in reader if float(row['overall']) > 0]
          except FileNotFoundError:
              print('ERROR: scores_summary.csv not found — evaluation may have failed.')
              sys.exit(1)

          if not scores:
              print('ERROR: No valid scores found in CSV.')
              sys.exit(1)

          avg_score = sum(scores) / len(scores)
          threshold = float('${{ env.MIN_OVERALL_SCORE }}')

          print(f'Average overall score: {avg_score:.2f} / 5.00')
          print(f'Threshold:             {threshold:.2f}')

          if avg_score < threshold:
              print(f'FAIL: Score {avg_score:.2f} is below threshold {threshold:.2f}')
              sys.exit(1)
          else:
              print(f'PASS: Score {avg_score:.2f} meets threshold {threshold:.2f}')
          "

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-smoke-report
          path: eval_smoke_results/
          retention-days: 30
