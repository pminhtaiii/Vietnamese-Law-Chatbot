# ─────────────────────────────────────────────────────────────────────
# Unified Docker Compose for Law Chatbot
# Services: Qdrant + Backend API, Frontend UI, Evaluation Worker
# ─────────────────────────────────────────────────────────────────────
#
# Usage:
#   docker compose up -d                        # Start backend + frontend
#   docker compose --profile eval up evaluation-worker  # Run evaluation
#   docker compose down                          # Stop all services
#
# Copy .env.example → .env and fill in your API keys before running.

services:
  # ── Backend (Qdrant + FastAPI) ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_server
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
    deploy:
      resources:
        limits:
          memory: 5G
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law_chatbot_net

  backend-api:
    build: ./backend
    container_name: backend-api
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
      # Surgical GraphRAG mounts — only the two paths the backend actually reads.
      # Saves ~3GB vs mounting the full output/ directory.
      # lancedb/  : entity_description + community_full_content vector tables (~200MB)
      # relationships.parquet: graph neighbor expansion (~382MB → ~1GB RAM after dict load)
      - ./data_pipelines/graph_rag/output/lancedb:/app/graphrag_output/lancedb:ro
      - ./data_pipelines/graph_rag/output/relationships.parquet:/app/graphrag_output/relationships.parquet:ro
      # Parent Store — SQLite lookup for parent_text after Qdrant retrieval.
      # Read-only; generated by the Kaggle pipeline (notebook_parent_child_pipeline.py).
      - ./data/parents.sqlite:/app/data/parents.sqlite:ro
    depends_on:
      qdrant:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_HOST=http://qdrant:6333
      - MIMO_API_KEY=${MIMO_API_KEY}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      # Explicit GraphRAG paths — avoids BASE_DIR.parent resolving to '/' in Docker
      - GRAPHRAG_LANCEDB_PATH=/app/graphrag_output/lancedb
      - GRAPHRAG_RELATIONSHIPS_PARQUET=/app/graphrag_output/relationships.parquet
      - PARENTS_SQLITE_PATH=/app/data/parents.sqlite
      # Resource and PyTorch execution controls
      - USE_LOCAL_RERANKER=${USE_LOCAL_RERANKER:-true}
      - TORCH_NUM_THREADS=${TORCH_NUM_THREADS:-2}
      - OMP_NUM_THREADS=${TORCH_NUM_THREADS:-2}
      - MKL_NUM_THREADS=${TORCH_NUM_THREADS:-2}
      - OPENMP_NUM_THREADS=${TORCH_NUM_THREADS:-2}
    deploy:
      resources:
        limits:
          memory: 6G
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - law_chatbot_net

  # ── Frontend UI ─────────────────────────────────────────────────────
  frontend-ui:
    image: yidadaa/chatgpt-next-web
    container_name: chatgpt-next-web
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CODE=${CODE}
      - BASE_URL=http://backend-api:8000
      - HIDE_USER_API_KEY=1
      - DISABLE_GPT4=0
      - ENABLE_BALANCE_QUERY=0
      - DISABLE_FAST_LINK=0
    depends_on:
      - backend-api
    networks:
      - law_chatbot_net

  # ── Evaluation Worker ──────────────────────────────────────────────
  # Only runs when explicitly requested via the "eval" profile.
  # Examples:
  #   docker compose --profile eval run --rm evaluation-worker python build_golden_dataset.py --help
  #   docker compose --profile eval run --rm evaluation-worker python ragas_evaluator.py --help
  #   docker compose --profile eval run --rm evaluation-worker python legal_rag_evaluator.py --help
  evaluation-worker:
    build: ./evaluation
    container_name: evaluation_worker
    profiles: ["eval"]
    volumes:
      - ./evaluation:/app
      - ./evaluation/eval_results:/app/eval_results
      - hf_cache:/root/.cache/huggingface
    depends_on:
      backend-api:
        condition: service_started
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_HOST=http://qdrant:6333
      - BACKEND_URL=http://backend-api:8000
      - COHERE_API_KEY=${COHERE_API_KEY}
      - MIMO_API_KEY=${MIMO_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - law_chatbot_net

  # ── GraphRAG Embedding Worker ──────────────────────────────────────
  # Runs Phase 6: embeds entities + community reports into LanceDB (BGE-M3, 1024-dim).
  # Only starts when explicitly requested via the "graphrag" profile.
  #
  # Examples:
  #   docker compose --profile graphrag run --rm graphrag-embedder          # Resume
  #   docker compose --profile graphrag run --rm graphrag-embedder --reset  # Fresh start
  #   docker compose --profile graphrag run --rm graphrag-embedder --reset --batch-size 16
  graphrag-embedder:
    build:
      context: ./data_pipelines/graph_rag
      dockerfile: Dockerfile.phase6
    container_name: graphrag_embedder
    profiles: ["graphrag"]
    volumes:
      # Mount the whole graph_rag dir so the script reads/writes output/ in-place
      - ./data_pipelines/graph_rag:/app
      # Reuse shared HuggingFace model cache (avoids re-downloading BGE-M3 ~2GB)
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 8G   # BGE-M3 ~2GB RAM + pandas DataFrames for 153K entities
    networks:
      - law_chatbot_net

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  qdrant_data:
  hf_cache:

# ── Network ──────────────────────────────────────────────────────────
networks:
  law_chatbot_net:
    driver: bridge