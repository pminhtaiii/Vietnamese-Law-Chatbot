# ─────────────────────────────────────────────────────────────────────
# Backend-only convenience compose for isolated development.
#
# For the full system (backend + frontend + evaluation), use the
# root-level docker-compose.yml instead:
#
#   cd ..
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_server
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
    deploy:
      resources:
        limits:
          memory: 5G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: backend-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_HOST=http://qdrant:6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
